<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>文件夹处理系统</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f5f5f5;
}

.box {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
}

button:hover {
    background: #45a049;
}

#result {
    margin-top: 20px;
    background: #eef;
    padding: 15px;
    white-space: pre-wrap;
    min-height: 200px;
    border-radius: 8px;
}

.loading {
    color: orange;
    font-weight: bold;
}

.progress-container {
    font-family: Arial, sans-serif;
}

.current-status {
    background: #e8f4fd;
    padding: 10px;
    border-radius: 5px;
    margin-bottom: 15px;
    font-weight: bold;
    color: #2c5aa0;
}

.processed-files {
    max-height: 300px;
    overflow-y: auto;
}

.processed-file {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    margin: 5px 0;
    background: white;
    border-radius: 4px;
    border-left: 4px solid #4CAF50;
}

.file-type {
    font-weight: bold;
    color: #666;
    min-width: 60px;
}

.file-path {
    flex: 1;
    margin: 0 10px;
    color: #333;
}

.file-status {
    color: #4CAF50;
    font-size: 0.9em;
}

.progress-bar {
    width: 100%;
    height: 20px;
    background: #f0f0f0;
    border-radius: 10px;
    margin-top: 10px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4CAF50, #45a049);
    transition: width 0.3s ease;
}

.complete-result {
    background: #d4edda;
    border: 1px solid #c3e6cb;
    color: #155724;
    padding: 15px;
    border-radius: 5px;
}

.complete-result h3 {
    margin-top: 0;
    color: #155724;
}

.result-item {
    background: white;
    padding: 10px;
    margin: 10px 0;
    border-radius: 4px;
    border-left: 4px solid #28a745;
}

.error-result {
    background: #f8d7da;
    border: 1px solid #f5c6cb;
    color: #721c24;
    padding: 15px;
    border-radius: 5px;
    font-weight: bold;
}

.stream-text-box {
    background: #f0f8ff;
    border: 1px solid #b3d9ff;
    padding: 15px;
    margin-top: 15px;
    border-radius: 5px;
}

.stream-text-box h4 {
    margin-top: 0;
    color: #0056b3;
}

.stream-text-content {
    background: white;
    padding: 10px;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    max-height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="box">
    <h2>📁 文件夹处理系统（OCR + PDF合成 + 文本提取）</h2>

    <input type="file" id="zipInput" accept=".zip">

    <br><br>

    <button onclick="processSave()">开始处理并保存</button>

    <h3>结果</h3>
    <div id="result">等待操作...</div>
</div>

<script>
let zipFile = null;
let resultDiv = document.getElementById("result");

// 获取URL参数中的task_id
function getTaskIdFromUrl() {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get('task_id');
}

// ================= 选择文件 =================
document.getElementById("zipInput").addEventListener("change", function () {
    zipFile = this.files[0];

    if (!zipFile) {
        alert("未选择文件");
        return;
    }

    resultDiv.innerText = `已选择压缩包: ${zipFile.name}\n大小: ${(zipFile.size / 1024 / 1024).toFixed(2)} MB`;
});


// ================= 核心处理 =================
async function processSave() {

    if (!zipFile) {
        alert("请先选择压缩包");
        return;
    }

    let formData = new FormData();
    formData.append("zip_file", zipFile);

    // 添加task_id到表单数据
    const taskId = getTaskIdFromUrl();
    if (taskId) {
        formData.append("task_id", taskId);
    }

    resultDiv.innerHTML = "<div class='loading'>正在连接服务器...</div>";

    try {
        // 先发送POST请求启动处理
        const response = await fetch("/api/process_save/", {
            method: "POST",
            body: formData
        });

        const result = await response.json();

        if (result.code !== 0) {
            showError(result.msg);
            return;
        }

        // 启动SSE监听进度
        const eventSource = new EventSource(`/api/process_progress/${result.task_id}/`);

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);

            switch(data.type) {
                case 'start':
                    resultDiv.innerHTML = `<div class="progress-container">
                        <div class="current-status">${data.message}</div>
                        <div class="processed-files"></div>
                        <div id="stream-text-container" style="display:none;"></div>
                    </div>`;
                    break;

                case 'progress':
                    updateStatus(data.message);
                    break;

                case 'stream_text':
                    showStreamText(data.content);
                    break;

                case 'file_processed':
                    addProcessedFile(data.file);
                    break;

                case 'final_progress':
                    updateFinalProgress(data.progress, data.message);
                    break;

                case 'complete':
                    eventSource.close();
                    showFinalResult(data.data);
                    break;

                case 'error':
                    eventSource.close();
                    showError(data.message);
                    break;
            }
        };

        eventSource.onerror = function() {
            eventSource.close();
            showError("连接断开，请重试");
        };

    } catch (e) {
        showError("请求失败: " + e.message);
    }
}

// ================= 更新状态 =================
function updateStatus(message) {
    const statusDiv = document.querySelector('.current-status');
    if (statusDiv) {
        statusDiv.textContent = message;
    }
}

// ================= 显示流式文本 =================
function showStreamText(content) {
    let container = document.getElementById('stream-text-container');
    
    // 第一次显示时，创建容器
    if (container.style.display === 'none') {
        container.style.display = 'block';
        container.innerHTML = `
            <div class="stream-text-box">
                <h4>📋 任务汇报提取结果</h4>
                <div class="stream-text-content"></div>
            </div>
        `;
    }
    
    // 将内容添加到容器
    const contentDiv = container.querySelector('.stream-text-content');
    contentDiv.textContent += content;
    
    // 自动滚动到底部
    contentDiv.scrollTop = contentDiv.scrollHeight;
}

// ================= 添加处理文件 =================
function addProcessedFile(fileInfo) {
    const filesDiv = document.querySelector('.processed-files');
    if (filesDiv) {
        const fileDiv = document.createElement('div');
        fileDiv.className = 'processed-file';
        fileDiv.innerHTML = `
            <span class="file-type">${fileInfo.type}</span>
            <span class="file-path">${fileInfo.path.split('/').pop()}</span>
            <span class="file-status">${fileInfo.status}</span>
        `;
        filesDiv.appendChild(fileDiv);
    }
}

// ================= 更新最终进度 =================
function updateFinalProgress(progress, message) {
    const statusDiv = document.querySelector('.current-status');
    if (statusDiv) {
        statusDiv.innerHTML = `
            ${message}
            <div class="progress-bar">
                <div class="progress-fill" style="width: ${progress}%"></div>
            </div>
        `;
    }
}

// ================= 显示最终结果 =================
function showFinalResult(data) {
    let html = `<div class="complete-result">
        <h3>✅ 处理完成</h3>`;

    data.forEach(item => {
        html += `
        <div class="result-item">
            <strong>文件:</strong> ${item.file_name}<br>
            <strong>保存路径:</strong> ${item.save_path}<br>
            <strong>说明:</strong> ${item.summary}
        </div>`;
    });

    html += `</div>`;
    resultDiv.innerHTML = html;
}

// ================= 显示错误 =================
function showError(message) {
    resultDiv.innerHTML = `<div class="error-result">❌ 错误: ${message}</div>`;
}


// ================= 展示结果 =================
function showSaveResult(data) {
    // 这个函数不再使用，由SSE处理
}
</script>

</body>
</html>
