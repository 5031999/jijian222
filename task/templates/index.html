<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>案件分析平台</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--primary-color:#1e40af;
--primary-gradient:linear-gradient(135deg,#1e40af,#3b82f6);
--text-color:#1f2937;
--text-secondary:#6b7280;
--bg-color:#f9fafb;
--card-bg:#ffffff;
--border-color:#e5e7eb;
--hover-color:#f3f4f6;
--success-color:#10b981;
}
body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI';
background:var(--bg-color);
color:var(--text-color);
}

.header{background:var(--primary-gradient);color:#fff;padding:20px;}
.container{max-width:1200px;margin:auto;padding:20px;}

.toolbar{display:flex;gap:10px;margin-bottom:20px;}
.btn-option{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;}
.btn-option.active{background:var(--primary-color);color:#fff;}
.btn-primary{padding:10px 20px;background:var(--primary-gradient);color:#fff;border:none;border-radius:8px;cursor:pointer;}

.task-table{background:#fff;border-radius:10px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th,td{padding:12px;border-bottom:1px solid #eee;}
tr:hover{background:#f9fafb;}

.status-badge{padding:4px 10px;border-radius:12px;font-size:12px;}
.status-pending{background:#fef3c7;color:#b45309;}
.status-completed{background:#d1fae5;color:#065f46;}

.btn-sm{padding:4px 10px;border:1px solid #ddd;background:#fff;border-radius:6px;cursor:pointer;font-size:12px;}

.modal-overlay{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.4);align-items:center;justify-content:center;
}
.modal-overlay.active{display:flex;}
.modal{background:#fff;padding:20px;border-radius:10px;width:400px;}

.form-input{width:100%;padding:8px;margin-top:5px;margin-bottom:10px;}

</style>
</head>

<body>

<div class="header">
    <div class="container">
        <h2>📋 案件分析平台</h2>
    </div>
</div>

<div class="container">

    <div class="toolbar">
        <button class="btn-option active" onclick="filterTasks('processing',this)">进行中</button>
        <button class="btn-option" onclick="filterTasks('completed',this)">已完成</button>
        <button class="btn-primary" onclick="openCreateModal()">+ 创建任务</button>
    </div>

    <div class="task-table">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>任务名</th>
                    <th id="pathHeader">保存路径</th>
                    <th>状态</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="task_table"></tbody>
        </table>
    </div>

</div>

<!-- 创建任务 -->
<div class="modal-overlay" id="createModal">
    <div class="modal">
        <h3>创建任务</h3>
        <input id="modal_task_name" class="form-input" placeholder="任务名称">
        <button onclick="submitCreateTask()">创建</button>
        <button onclick="closeCreateModal()">取消</button>
    </div>
</div>

<script>

let currentFilter = 'processing';

// 加载任务
function loadTasks(){
    fetch("/api/tasks/")
    .then(res=>res.json())
    .then(res=>{
        const showPath = currentFilter === 'completed';
        document.getElementById("pathHeader").style.display = showPath ? '' : 'none';

        let html = "";

        res.data.forEach(item=>{

            if(currentFilter==='processing' && item.status!=='pending') return;
            if(currentFilter==='completed' && item.status!=='completed') return;

            const statusText = item.status==='pending'?'进行中':'已完成';
            const statusClass = item.status==='pending'?'status-pending':'status-completed';

            let btns = '';

            if(item.status==='pending'){
                btns = `
                    <button class="btn-sm" onclick="uploadFiles(${item.id})">上传</button>
                    <button class="btn-sm" onclick="deleteTask(${item.id})">删除</button>
                `;
            }else{
                btns = `
                    <button class="btn-sm" onclick="rejiekou(${item.id})">重跑</button>
                    <button class="btn-sm" style="background:#10b981;color:#fff;" onclick="downloadFile(${item.id})">下载</button>
                    <button class="btn-sm" onclick="deleteTask(${item.id})">删除</button>
                `;
            }

            html += `
            <tr>
                <td>${item.id}</td>
                <td>${item.task_name}</td>
                ${showPath ? `<td>${item.file_path || '-'}</td>` : ''}
                <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                <td>${item.created_at}</td>
                <td>${btns}</td>
            </tr>
            `;
        });

        if(!html){
            html = `<tr><td colspan="6">暂无任务</td></tr>`;
        }

        document.getElementById("task_table").innerHTML = html;
    })
}

// 过滤
function filterTasks(type,btn){
    currentFilter = type;
    document.querySelectorAll('.btn-option').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    loadTasks();
}

// 创建任务
function openCreateModal(){
    document.getElementById('createModal').classList.add('active');
}

function closeCreateModal(){
    document.getElementById('createModal').classList.remove('active');
}

function submitCreateTask(){

    let task_name = document.getElementById("modal_task_name").value.trim();

    if(!task_name){
        alert("请输入任务名");
        return;
    }

    fetch("/api/tasks/create/",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({task_name})
    })
    .then(res=>res.json())
    .then(()=>{
        closeCreateModal();
        loadTasks();
    })
}

// 删除
function deleteTask(id){
    if(!confirm("确认删除?")) return;

    fetch(`/api/tasks/${id}/delete/`,{method:"POST"})
    .then(()=>loadTasks());
}

// 上传
function uploadFiles(id){
    location.href=`/upload/?task_id=${id}`;
}

// 重跑
function rejiekou(id){
    fetch(`/api/tasks/${id}/rejiekou/`,{method:"POST"})
    .then(()=>loadTasks());
}

// 下载
function downloadFile(id){
    // 创建隐藏的链接并触发下载
    const link = document.createElement('a');
    link.href = `/api/tasks/${id}/download/`;
    link.click();
}

// 初始化
loadTasks();

</script>

</body>
</html>
